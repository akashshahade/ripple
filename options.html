<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ripple settings</title>
<style>
  :root {
    --ink: #132420;
    --surface: #1C302A;
    --accent: #7FB3A3;
    --amber: #E3A857;
    --text: #F1EDE2;
    --muted: #9FB3AA;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-width: 340px;
    padding: 28px 26px 24px;
    background: var(--ink);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  h1 {
    font-family: Georgia, ui-serif, serif;
    font-weight: 500;
    font-size: 22px;
    margin: 0 0 4px;
  }
  .sub {
    color: var(--muted);
    font-size: 12.5px;
    margin: 0 0 24px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-top: 1px solid rgba(159,179,170,0.15);
  }
  .row:first-of-type { border-top: none; }
  label { font-size: 13.5px; }
  select, input[type=number] {
    background: var(--surface);
    border: 1px solid rgba(159,179,170,0.25);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
  }
  .toggle {
    position: relative;
    width: 38px;
    height: 22px;
    appearance: none;
    background: rgba(159,179,170,0.25);
    border-radius: 999px;
    cursor: pointer;
    outline: none;
    transition: background 150ms ease;
  }
  .toggle:checked { background: var(--accent); }
  .toggle::before {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--text);
    transition: transform 150ms ease;
  }
  .toggle:checked::before { transform: translateX(16px); }
  .nudge-types { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .chip {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid rgba(159,179,170,0.3);
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .chip.on {
    background: var(--accent);
    color: #0E1A17;
    border-color: var(--accent);
    font-weight: 600;
  }
  .save {
    all: unset;
    display: block;
    margin-top: 22px;
    text-align: center;
    cursor: pointer;
    background: var(--amber);
    color: #241A0B;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 0;
    border-radius: 999px;
  }
  .status { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 10px; height: 14px; }
</style>
</head>
<body>
  <h1>Ripple</h1>
  <p class="sub">Gentle nudges, tuned to your rhythm.</p>

  <div class="row">
    <label for="enabled">Nudges on</label>
    <input type="checkbox" id="enabled" class="toggle" />
  </div>

  <div class="row">
    <label for="interval">Remind me every</label>
    <select id="interval">
      <option value="10">10 minutes</option>
      <option value="15">15 minutes</option>
      <option value="20">20 minutes</option>
      <option value="30">30 minutes</option>
      <option value="45">45 minutes</option>
      <option value="60">60 minutes</option>
    </select>
  </div>

  <div class="row" style="display:block;">
    <label>Nudge types</label>
    <div class="nudge-types">
      <div class="chip" data-key="hydrate">Sip</div>
      <div class="chip" data-key="stretch">Stretch</div>
      <div class="chip" data-key="blink">Blink</div>
      <div class="chip" data-key="breathe">Breathe</div>
    </div>
  </div>

  <button class="save" id="save">Save changes</button>
  <p class="status" id="status"></p>

  <script src="options.js"></script>
</body>
</html>
