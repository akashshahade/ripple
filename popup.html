<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  body {
    margin: 0;
    width: 220px;
    padding: 18px;
    background: #132420;
    color: #F1EDE2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  h1 {
    font-family: Georgia, ui-serif, serif;
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 2px;
  }
  p { font-size: 12px; color: #9FB3AA; margin: 0 0 16px; }
  button {
    all: unset;
    display: block;
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    cursor: pointer;
    padding: 9px 0;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .primary { background: #7FB3A3; color: #0E1A17; }
  .secondary { background: transparent; border: 1px solid rgba(159,179,170,0.3); color: #9FB3AA; }
</style>
</head>
<body>
  <h1>Ripple</h1>
  <p id="statusLine">Loading…</p>
  <button class="primary" id="testNudge">Show a nudge now</button>
  <button class="secondary" id="openOptions">Settings</button>
  <script src="popup.js"></script>
</body>
</html>
